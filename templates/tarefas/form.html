{% extends 'base.html' %}

{% block content %}

<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <h2>{{ titulo }}</h2>
            <a href="{% url 'lista_tarefas' %}" class="btn-voltar">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <form method="POST" class="tarefa-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label><i class="bi bi-pencil"></i> Título *</label>
                {{ form.titulo }}
            </div>

            <div class="form-group">
                <label><i class="bi bi-text-paragraph"></i> Descrição</label>
                {{ form.descricao }}
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="bi bi-flag"></i> Status</label>
                    {{ form.status }}
                </div>
                <div class="form-group">
                    <label><i class="bi bi-exclamation-diamond"></i> Prioridade</label>
                    {{ form.prioridade }}
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="bi bi-calendar-check"></i> Prazo</label>
                    {{ form.prazo }}
                </div>
                <div class="form-group">
                    <label><i class="bi bi-tag"></i> Etiqueta</label>
                    {{ form.etiqueta }}
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <i class="bi bi-check-lg"></i> Salvar
            </button>
        </form>
    </div>
</div>

{% endblock %}
